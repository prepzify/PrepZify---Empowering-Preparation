services:
  - type: web
    name: prepzify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard (secret)
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel deployment URL (e.g. https://prepzify.vercel.app)
      - key: RAZORPAY_KEY_ID
        sync: false          # Set manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false          # Set manually in Render dashboard
      - key: EMAIL_USER
        sync: false          # Gmail address used as SMTP sender
      - key: EMAIL_PASS
        sync: false          # Gmail App Password (not your normal Gmail password)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
